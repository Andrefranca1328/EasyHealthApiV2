services:
  - type: web
    name: easyhealth-api
    runtime: node
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_ENV
        value: production
      - key: MONGO_URI
        sync: false   # configurar manualmente no painel do Render
      - key: JWT_SECRET
        sync: false
      - key: JWT_EXPIRES_IN
        value: 1h
      - key: ALLOWED_ORIGINS
        sync: false   # ex: https://seu-frontend.vercel.app
      - key: API_BASE_URL
        sync: false   # ex: https://easyhealth-api.onrender.com
