name: CI – Backend (EasyHealth API)

on:
  push:
    branches: [ "main", "develop" ]
  pull_request:
    branches: [ "main" ]

jobs:

  # ── JOB 1: Testes Unitários ───────────────────────────────────────────────
  unit-tests:
    name: 🧪 Testes Unitários (Jest)
    runs-on: ubuntu-latest

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🧪 Rodar testes unitários com cobertura
        run: npm test
        env:
          JWT_SECRET: easyhealth_dev_secret_2026

      - name: 📤 Upload do relatório de cobertura
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: jest-coverage
          path: coverage/
          retention-days: 7

  # ── JOB 2: Testes de Integração (endpoints) ──────────────────────────────
  integration-tests:
    name: 🔗 Testes de Integração – Endpoints (Newman)
    runs-on: ubuntu-latest
    needs: unit-tests  # só roda se os testes unitários passarem

    services:
      mongodb:
        image: mongo:latest
        ports:
          - 27017:27017

    env:
      JWT_SECRET: ${{ secrets.JWT_SECRET || 'easyhealth_dev_secret_2026' }}
      MONGODB_URI: ${{ secrets.MONGODB_URI || 'mongodb://localhost:27017/easyhealth' }}
      PORT: 3000

    steps:
      - name: 📥 Checkout do repositório
        uses: actions/checkout@v4

      - name: ⚙️ Configurar Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: 📦 Instalar dependências
        run: npm install

      - name: 🚀 Iniciar servidor Express
        run: |
          npm start &
          npx wait-on http://localhost:3000/ -t 60000

      - name: 🔐 Testar endpoints de Auth (register + login)
        run: |
          npx newman run tests/newman/easyhealth.postman_collection.json \
            --folder "Auth – Cadastro e Login" \
            --env-var baseUrl=http://localhost:3000 \
            --reporters cli \
            --reporter-cli-no-banner

      - name: 🧪 Testar todos os outros endpoints
        run: |
          npx newman run tests/newman/easyhealth.postman_collection.json \
            --env-var baseUrl=http://localhost:3000 \
            --reporters cli \
            --reporter-cli-no-banner

      - name: 📊 Resumo final
        if: always()
        run: |
          echo "============================================"
          echo "  Resultado: ${{ job.status }}"
          echo "============================================"
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Todos os endpoints responderam corretamente!"
          else
            echo "❌ Falha detectada – verifique os logs acima."
          fi